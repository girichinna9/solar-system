name: Solar System Workflow

on:
  workflow_dispatch:
  push:
    branches:
     - main
     - feature/*
env: 
    MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD}}
jobs:
  Unit-Testing:
      name: Unit Testing
      strategy:
          matrix:
              nodejs_version: [18, 20]
              operating_system: [ubuntu-latest]
              exclude:
                  - nodejs_version: 20
                    operating_system: ubuntu-latest
      runs-on: ${{ matrix.operating_system }}
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup NodeJS Version - ${{ matrix.nodejs_version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.nodejs_version }}

      - name: cache NPM Dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashfiles('package-lock.json') }}

      - name: Install Dependencies
        run:  npm install

      - name: Unit Testing
        id: nodejs-unit-testing-step
        run: npm test

      - name: Archive/upload Test Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mocha-Test-Result
          path: test-results.xml
  Code-Coverage:
      needs: Unit-testing
      name: Code Coverage
      runs-on: ubuntu-latest
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup NodeJS Version - 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: cache NPM Dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashfiles('package-lock.json') }}

      - name: Install Dependencies
        run:  npm install

      - name: Check Code Coverage
        continue-on-error: true
        run: npm run coverage

      - name: Archive/upload Test Result
        uses: actions/upload-artifact@v4
        with:
          name: Code-Coverage-Result
          path: coverage
          retention-days: 5
    
  Docker:
      name: Containerization
      needs: [unit-testing, code-coverage]
      permissions:
          # contents: read 
          packages: write
      runs-on: ubuntu-latest
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dockerhub login 
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: GHCR login 
        uses: docker/login-action@v2.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker Build for testing
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}

      - name: Docker image test
        run: |
           docker images
           docker run --name solar-system-app -d \
           -p 3000:3000 \
           -e MONGO_URI=$MONGO_URI \
           -e MONGO_USERNAME=$MONGO_USERNAME \
           -e MONGO_PASSWORD=$MONGO_PASSWORD \
           ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha}}
           
           export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
           echo $IP
          
           echo Testing Image URI using wget
           wget -q -O - 127.0.0.1:3000/live | grep live 

      - name: Container Registry Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
           ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}    
           ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha}}
  dev-deploy:
      name: Deploy to Development
      needs: docker
      runs-on: self-hosted

      outputs:
       APP_INGRESS_URL: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}

      steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes
        run: |
          kubectl version
          kubectl config current-context
          kubectl get nodes
          minikube status

      - name: Save Minikube IP
        run: |
          IP=$(minikube ip)
          echo "INGRESS_IP=$IP" >> "$GITHUB_ENV"
          echo "Minikube IP: $IP"

      - name: Replace Tokens
        uses: cschleiden/replace-tokens@v1
        with:
          tokenPrefix: '${'
          tokenSuffix: '}'
          files: '["kubernetes/development/*.yaml"]'
        env:
          NAMESPACE: ${{ vars.NAMESPACE }}
          REPLICAS: ${{ vars.REPLICAS }}
          K8S_IMAGE: ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
          INGRESS_IP: ${{ env.INGRESS_IP }}

      - name: Check Kubernetes Manifests
        run: |
          cat kubernetes/development/*.yaml

      - name: Create Namespace
        run: |
          kubectl create namespace ${{ vars.NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

      - name: Create MongoDB Secret
        run: |
            kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
            --from-literal=MONGO_URI="${{ env.MONGO_URI }}" \
            --from-literal=MONGO_USERNAME="${{ vars.MONGO_USERNAME }}" \
            --from-literal=MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application
        run: |
          kubectl apply -f kubernetes/development

      - name: Wait for Deployment
        run: |
          kubectl rollout status deployment/solar-system \
          -n ${{ vars.NAMESPACE }} --timeout=180s

      - name: Verify Resources
        run: |
          kubectl get all -n ${{ vars.NAMESPACE }}
            kubectl get ingress -n ${{ vars.NAMESPACE }}

      - name: Set App Ingress Host
        id: set-ingress-host-address
        run: |
          APP_HOST=$(kubectl -n ${{ vars.NAMESPACE }} get ingress -o jsonpath='{.items[0].spec.rules[0].host}')

          echo "Application Host: $APP_HOST"
  
          echo "APP_INGRESS_HOST=$APP_HOST" >> "$GITHUB_OUTPUT"

  Integration-Test:
    name: Dev Integration testing
    needs: dev-deploy
    runs-on:
      - self-hosted
      - Linux

    steps:
    - name: Verify Output
      run: |
        echo "Ingress URL: ${{ needs.dev-deploy.outputs.APP_INGRESS_URL }}"

    - name: Test URL Output
      env:
        URL: ${{ needs.dev-deploy.outputs.APP_INGRESS_URL }}
      run: |
        echo "Testing URL: https://$URL/live"

        RESPONSE=$(curl -k -s "https://$URL/live")

        echo "Response: $RESPONSE"

        STATUS=$(echo "$RESPONSE" | jq -r '.status')

        echo "Status: $STATUS"

        if [ "$STATUS" != "live" ]; then
          echo "Application is not live."
          exit 1
        fi

        echo "Integration Test Passed."