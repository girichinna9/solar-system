workflow:
    name: node-js-application
    rules:
        - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == /^feature/
          when: always
        - if: $CI_MERGE_REQUEST_SOURCE_BRANCH =~ /^feature/ && $CI_PIPELINE_SOURCE == 'merge_request_event'
stages:
  - test
unit_testing:
    tags:
        - azure-linux-ubuntu-runner
    stage: test
    image: node:17-alpine3.14
    before_script:
        - npm install
        - npm start
        - apt update
        - apt install -y curl
    script:
        - curl http://localhost:3000/
        - npm test

