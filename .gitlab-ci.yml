workflow:
    name: node-js-application
    rules:
        - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^feature/'
          when: always
        - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^feature/ && $CI_PIPELINE_SOURCE == "merge_request_event"'
          when: always
stages:
  - test
unit_testing:
    tags:
        - azure-linux-ubuntu-runner
    stage: test
    image: node:17-alpine3.14
    cache:
        key: ${CI_COMMIT_REF_SLUG}
        paths:
            - node_modules/
    before_script:
        - npm install
    script:
        - echo "I commiting it to feature/a branch"
        - npm test
    artifacts:
      when: always
      access: all
      expire_in: 3 days
      paths:
        - test-results.xml
      reports:
        junit: test-results.xml
coverage-testing:
    tags:
        - azure-linux-ubuntu-runner
    stage: test
    image: node:17-alpine3.14
    cache:
        key: ${CI_COMMIT_REF_SLUG}
        paths:
            - node_modules/
    before_script:
        - npm install
    script:
        - echo "I commiting it to feature/a branch"
        - npm run coverage
    artifacts:
      when: always
      access: all
      expire_in: 3 days
      paths:
        - coverage/
    coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

